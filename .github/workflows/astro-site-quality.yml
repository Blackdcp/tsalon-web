name: Astro site quality

on:
  pull_request:
    paths:
      - 'design-systems/01-protocol/prototype/**'
      - '.github/workflows/astro-site-quality.yml'
      - 'vercel.json'
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-systems/01-protocol/prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: design-systems/01-protocol/prototype/package-lock.json
      - run: npm ci
      - run: npm run content:validate
      - run: npm run build
      - run: npm run site:links
      - uses: actions/upload-artifact@v4
        with:
          name: tsalon-static-site
          path: design-systems/01-protocol/prototype/dist
